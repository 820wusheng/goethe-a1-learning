<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能检查清单</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #667eea; }
        .checklist { background: white; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .check-item { padding: 10px; margin: 5px 0; border-left: 4px solid #ccc; }
        .check-item.pass { border-color: #48bb78; background: #c6f6d5; }
        .check-item.fail { border-color: #f56565; background: #fed7d7; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Goethe A1 功能检查清单</h1>
    
    <div class="checklist">
        <h2>📄 页面可访问性测试</h2>
        <div id="page-tests"></div>
        <button onclick="testPages()">开始测试</button>
    </div>

    <div class="checklist">
        <h2>🎵 音频功能测试</h2>
        <div class="check-item">
            <strong>AI朗读测试：</strong>
            <button onclick="testAudio()">测试德语AI朗读</button>
            <span id="audio-result"></span>
        </div>
    </div>

    <div class="checklist">
        <h2>📊 数据文件测试</h2>
        <div id="data-tests"></div>
        <button onclick="testData()">测试数据加载</button>
    </div>

    <script>
        async function testPages() {
            const pages = [
                'html/index-main.html',
                'html/listening-complete.html',
                'html/exam-complete.html',
                'html/vocabulary.html'
            ];
            
            const container = document.getElementById('page-tests');
            container.innerHTML = '';
            
            for (const page of pages) {
                try {
                    const response = await fetch(page);
                    const status = response.ok ? 'pass' : 'fail';
                    const div = document.createElement('div');
                    div.className = `check-item ${status}`;
                    div.textContent = `${status === 'pass' ? '✓' : '✗'} ${page} - ${response.status}`;
                    container.appendChild(div);
                } catch (error) {
                    const div = document.createElement('div');
                    div.className = 'check-item fail';
                    div.textContent = `✗ ${page} - 错误: ${error.message}`;
                    container.appendChild(div);
                }
            }
        }

        function testAudio() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('Guten Tag');
                utterance.lang = 'de-DE';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
                document.getElementById('audio-result').textContent = '✓ AI朗读功能正常';
                document.getElementById('audio-result').style.color = 'green';
            } else {
                document.getElementById('audio-result').textContent = '✗ 浏览器不支持语音合成';
                document.getElementById('audio-result').style.color = 'red';
            }
        }

        async function testData() {
            const dataFiles = [
                'data/transcripts_with_translation.json',
                'data/vocabulary_data.json',
                'data/answers.json'
            ];
            
            const container = document.getElementById('data-tests');
            container.innerHTML = '';
            
            for (const file of dataFiles) {
                try {
                    const response = await fetch(file);
                    const data = await response.json();
                    const keys = Object.keys(data);
                    const div = document.createElement('div');
                    div.className = 'check-item pass';
                    div.textContent = `✓ ${file} - ${keys.length} 条数据`;
                    container.appendChild(div);
                } catch (error) {
                    const div = document.createElement('div');
                    div.className = 'check-item fail';
                    div.textContent = `✗ ${file} - 错误: ${error.message}`;
                    container.appendChild(div);
                }
            }
        }

        // 自动运行测试
        window.onload = function() {
            testPages();
            testData();
        };
    </script>
</body>
</html>
