<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goethe A1 学习中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            font-size: 3em;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.3em;
            margin-bottom: 60px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }

        .card-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .card-title {
            color: white;
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-desc {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        .footer {
            text-align: center;
            color: #999;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
            font-size: 1em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇩🇪 Goethe A1 学习中心</h1>
        <div class="subtitle">完整的A1级别学习资源</div>

        <div class="cards">
            <a href="listening-complete.html">
                <div class="card">
                    <div class="card-icon">🎧</div>
                    <div class="card-title">听力练习</div>
                    <div class="card-desc">15题完整版<br>含原文+翻译+音频</div>
                </div>
            </a>

            <a href="vocabulary.html">
                <div class="card">
                    <div class="card-icon">📚</div>
                    <div class="card-title">词汇学习</div>
                    <div class="card-desc">2,073个单词<br>含例句+音频+翻译</div>
                </div>
            </a>
        </div>

        <div class="footer">
            <p><strong>功能说明：</strong></p>
            <p style="margin-top: 15px;">
                ✅ 所有音频支持AI朗读和官方音频<br>
                ✅ 完整的德语原文和中文翻译<br>
                ✅ 重点词汇标绿显示<br>
                ✅ 响应式设计，手机电脑都适配
            </p>
        </div>
    </div>
</body>
</html>
