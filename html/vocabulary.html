<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德语 A1 词汇学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .word-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .word-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .word-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .word-german {
            font-size: 2em;
            font-weight: bold;
            color: #2d3748;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .word-german:hover {
            color: #667eea;
        }

        .word-german.important {
            color: #22c55e;
        }

        .word-german.important:hover {
            color: #16a34a;
        }

        .important-badge {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.5em;
            font-weight: 600;
            margin-left: 10px;
        }

        .word-type {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .word-chinese {
            font-size: 1.3em;
            color: #4a5568;
            margin-bottom: 15px;
        }

        .examples {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .examples-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .example-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .example-german {
            font-size: 1.15em;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .example-german:hover .speaker-icon {
            color: #764ba2;
        }

        .example-chinese {
            font-size: 1em;
            color: #718096;
            padding-left: 28px;
            font-style: italic;
            background: #f0f4ff;
            padding: 8px 12px 8px 28px;
            border-radius: 6px;
            margin-top: 5px;
        }

        .translate-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
            margin-left: auto;
            transition: all 0.2s;
        }

        .translate-btn:hover {
            background: #38a169;
            transform: scale(1.05);
        }

        .translate-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .translation-loading {
            color: #a0aec0;
            font-size: 0.9em;
            padding-left: 28px;
        }

        .speaker-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .speaker-icon:hover {
            transform: scale(1.2);
        }

        .speaker-icon.playing {
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding: 20px;
        }

        .page-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3748;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇩🇪 德语 A1 词汇学习</h1>
            <p>点击单词或句子播放发音</p>
        </header>

        <div class="content">
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalWords">0</div>
                    <div class="stat-label">总词汇量</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #22c55e, #16a34a);">
                    <div class="stat-number" id="importantWords">0</div>
                    <div class="stat-label">⭐ 重点词汇</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalExamples">0</div>
                    <div class="stat-label">例句数量</div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索德语单词或中文翻译...">
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-type="all">全部 (2073)</button>
                <button class="filter-btn" data-type="重点" style="background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border-color: #22c55e;">⭐ 重点词汇 (788)</button>
                <button class="filter-btn" data-type="名词">名词 (1230)</button>
                <button class="filter-btn" data-type="动词">动词 (309)</button>
                <button class="filter-btn" data-type="形容词">形容词 (63)</button>
                <button class="filter-btn" data-type="副词">副词 (22)</button>
                <button class="filter-btn" data-type="其他">其他 (449)</button>
            </div>

            <div id="wordList"></div>

            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevBtn">← 上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button class="page-btn" id="nextBtn">下一页 →</button>
            </div>
        </div>
    </div>

    <script>
        // 从JSON文件加载词汇数据
        let vocabularyData = [];
        let allVocabulary = [];
        let currentPage = 1;
        const itemsPerPage = 50;

        // 加载数据
        fetch('../data/vocabulary_data.json')
            .then(response => response.json())
            .then(data => {
                allVocabulary = data;
                vocabularyData = data;
                console.log(`✅ 成功加载 ${data.length} 个词条`);
                renderWords(vocabularyData);
                setupPagination();
            })
            .catch(error => {
                console.error('加载词汇数据失败:', error);
                alert('加载词汇数据失败，请确保 ../data/vocabulary_data.json 文件在同一目录下');
            });

        // 创建音频播放图标SVG
        function createSpeakerIcon() {
            return `<svg class="speaker-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>`;
        }

        // 使用 Web Speech API 播放文本
        function speakText(text, icon) {
            if ('speechSynthesis' in window) {
                // 停止之前的播放
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                utterance.rate = 0.9;

                icon.classList.add('playing');

                utterance.onend = () => {
                    icon.classList.remove('playing');
                };

                utterance.onerror = () => {
                    icon.classList.remove('playing');
                    alert('音频播放失败，请确保您的浏览器支持德语语音合成。');
                };

                window.speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音合成功能。');
            }
        }

        // 渲染单词卡片
        function renderWordCard(word, index) {
            const examplesHTML = word.examples.map((example, exIdx) => {
                const exampleId = `example-${index}-${exIdx}`;
                return `
                <div class="example-item" id="${exampleId}">
                    <div class="example-german">
                        <span onclick="speakText('${example.german.replace(/'/g, "\\'")}', this.querySelector('.speaker-icon'))" style="cursor: pointer; display: flex; align-items: center; gap: 8px; flex: 1;">
                            ${createSpeakerIcon()}
                            ${example.german}
                        </span>
                        ${!example.chinese ? `<button class="translate-btn" onclick="translateExample('${exampleId}', '${example.german.replace(/'/g, "\\'")}')">翻译</button>` : ''}
                    </div>
                    ${example.chinese ? `<div class="example-chinese">${example.chinese}</div>` : `<div class="translation-loading" id="${exampleId}-translation" style="display:none;"></div>`}
                </div>
            `}).join('');

            return `
                <div class="word-card" data-type="${word.type}">
                    <div class="word-header">
                        <div class="word-german ${word.important ? 'important' : ''}" onclick="speakText('${word.german.replace(/'/g, "\\'")}', this.querySelector('.speaker-icon'))">
                            ${createSpeakerIcon()}
                            ${word.german}
                            ${word.important ? '<span class="important-badge">⭐ 重点</span>' : ''}
                        </div>
                        <span class="word-type">${word.type}</span>
                    </div>
                    <div class="word-chinese">${word.chinese}</div>
                    ${word.examples.length > 0 && word.examples[0].german ? `
                        <div class="examples">
                            <div class="examples-title">📝 例句</div>
                            ${examplesHTML}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // 渲染所有单词（带分页）
        function renderWords(words) {
            vocabularyData = words;
            currentPage = 1;

            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const pageWords = words.slice(startIdx, endIdx);

            const wordList = document.getElementById('wordList');
            wordList.innerHTML = pageWords.map((word, idx) => renderWordCard(word, startIdx + idx)).join('');

            // 更新统计
            document.getElementById('totalWords').textContent = allVocabulary.length;
            const importantCount = allVocabulary.filter(word => word.important).length;
            document.getElementById('importantWords').textContent = importantCount;
            const totalExamples = allVocabulary.reduce((sum, word) => sum + word.examples.length, 0);
            document.getElementById('totalExamples').textContent = totalExamples;

            // 更新分页
            updatePagination();

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 更新分页显示
        function updatePagination() {
            const totalPages = Math.ceil(vocabularyData.length / itemsPerPage);
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页 (共 ${vocabularyData.length} 词)`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || vocabularyData.length === 0;
        }

        // 分页控制
        function setupPagination() {
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    showPage(currentPage);
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                const totalPages = Math.ceil(vocabularyData.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    showPage(currentPage);
                }
            });
        }

        // 显示指定页
        function showPage(page) {
            const startIdx = (page - 1) * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const pageWords = vocabularyData.slice(startIdx, endIdx);

            const wordList = document.getElementById('wordList');
            wordList.innerHTML = pageWords.map((word, idx) => renderWordCard(word, startIdx + idx)).join('');

            updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 翻译例句功能
        async function translateExample(exampleId, germanText) {
            const translationDiv = document.getElementById(`${exampleId}-translation`);
            const button = event.target;

            button.disabled = true;
            button.textContent = '翻译中...';
            translationDiv.style.display = 'block';
            translationDiv.textContent = '正在翻译...';
            translationDiv.className = 'translation-loading';

            try {
                // 使用 MyMemory Translation API（免费，无需API key）
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(germanText)}&langpair=de|zh-CN`);
                const data = await response.json();

                if (data.responseStatus === 200 && data.responseData) {
                    const translation = data.responseData.translatedText;
                    translationDiv.textContent = translation;
                    translationDiv.className = 'example-chinese';
                    button.style.display = 'none';
                } else {
                    throw new Error('翻译失败');
                }
            } catch (error) {
                console.error('翻译错误:', error);
                translationDiv.textContent = '翻译失败，请重试';
                translationDiv.className = 'translation-loading';
                button.disabled = false;
                button.textContent = '重试';
            }
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredWords = allVocabulary.filter(word =>
                word.german.toLowerCase().includes(searchTerm) ||
                word.chinese.includes(searchTerm) ||
                word.examples.some(ex =>
                    ex.german.toLowerCase().includes(searchTerm) ||
                    ex.chinese.includes(searchTerm)
                )
            );
            renderWords(filteredWords);
        });

        // 类型过滤
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const type = btn.dataset.type;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();

                let filteredWords = allVocabulary;

                // 应用类型过滤
                if (type === '重点') {
                    filteredWords = filteredWords.filter(word => word.important);
                } else if (type !== 'all') {
                    filteredWords = filteredWords.filter(word => word.type === type);
                }

                // 应用搜索过滤
                if (searchTerm) {
                    filteredWords = filteredWords.filter(word =>
                        word.german.toLowerCase().includes(searchTerm) ||
                        word.chinese.includes(searchTerm) ||
                        word.examples.some(ex =>
                            ex.german.toLowerCase().includes(searchTerm) ||
                            ex.chinese.includes(searchTerm)
                        )
                    );
                }

                renderWords(filteredWords);
            });
        });
    </script>
</body>
</html>
